<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="referrer" content="no-referrer" />
    <title>New Tab</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="search-wrapper">
      <img id="engineIcon" alt="" />
      <form id="searchForm" method="GET">
        <input
          type="text"
          id="searchInput"
          name="q"
          autocomplete="off"
          spellcheck="false"
          autofocus
        />
      </form>
    </div>

    <div class="fixed-actions">
    <a 
      href="https://github.com/x02mateus/minimal-newtab"
      target="_blank"
      rel="noopener noreferrer"
      id="githubBtn"
      aria-label="GitHub Repository"
    >
      <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
        <path d="M12 .5C5.73.5.5 5.73.5 12c0 5.09 3.29 9.41 7.86 10.94.57.1.78-.25.78-.55
        0-.27-.01-1.17-.02-2.12-3.2.7-3.88-1.54-3.88-1.54-.52-1.34-1.27-1.7-1.27-1.7
        -1.04-.71.08-.7.08-.7 1.15.08 1.75 1.18 1.75 1.18
        1.02 1.75 2.68 1.25 3.33.96.1-.74.4-1.25.73-1.54
        -2.55-.29-5.23-1.27-5.23-5.66 0-1.25.45-2.27 1.18-3.07
        -.12-.29-.51-1.46.11-3.05 0 0 .96-.31 3.14 1.17
        .91-.25 1.88-.38 2.85-.38.97 0 1.94.13 2.85.38
        2.18-1.48 3.14-1.17 3.14-1.17.62 1.59.23 2.76.11 3.05
        .73.8 1.18 1.82 1.18 3.07 0 4.4-2.68 5.37-5.24 5.65
        .41.36.77 1.08.77 2.18 0 1.57-.01 2.83-.01 3.21
        0 .3.21.65.79.54C20.71 21.4 24 17.09 24 12
        24 5.73 18.77.5 12 .5z"/>
      </svg>
    </a>

    <button id="settingsBtn" aria-label="">⚙</button>
  </div>

    <div id="settingsPanel" class="hidden">
      <h3 data-i18n="settingsTitle"></h3>

      <label>
        <span data-i18n="textColor"></span>
        <input type="color" id="textColorPicker" />
      </label>

      <label>
        <span data-i18n="bgColor"></span>
        <input type="color" id="bgColorPicker" />
      </label>

      <button id="closeSettings" data-i18n="closeBtn"></button>
    </div>

    <script src="config.js" defer></script>
  </body>
</html>
